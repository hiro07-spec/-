<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ポーカー清算">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1917">
<title>ポーカー清算</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border-strong: #c8c5bb;
  --text: #1a1917;
  --text-muted: #7a7870;
  --text-hint: #b0ada4;
  --accent: #1a1917;
  --green: #1a6644;
  --green-bg: #e8f4ee;
  --red: #c0392b;
  --amber: #8a5a00;
  --amber-bg: #fef4e0;
  --radius: 10px;
  --radius-lg: 14px;
}
body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; padding-bottom: 80px;
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; background: none; border: none;
  padding: 10px 4px 8px; font-family: inherit;
  font-size: 10px; color: var(--text-hint);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 20px; line-height: 1; }

.page { display: none; padding: 16px 16px 0; }
.page.active { display: block; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px; position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 10px;
}
.header-back {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text); padding: 0 6px 0 0; display: none;
  -webkit-tap-highlight-color: transparent; line-height: 1;
}
.header-text h1 { font-size: 17px; font-weight: 600; }
.header-text p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
}

input[type=text], input[type=number] {
  height: 40px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg);
  color: var(--text); font-size: 15px; font-family: inherit;
  padding: 0 10px; outline: none;
  -webkit-appearance: none; appearance: none; width: 100%;
}
input:focus { border-color: var(--accent); background: var(--surface); }
input[type=number] { text-align: center; }

.rate-grid { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rate-grid span { font-size: 14px; color: var(--text-muted); white-space: nowrap; }
.rate-grid input { width: 88px; }
.rate-preview {
  font-size: 12px; color: var(--text-muted); background: var(--bg);
  border-radius: var(--radius); padding: 7px 10px; margin-top: 10px;
}
.rate-preview b { color: var(--text); font-weight: 600; }

.start-row { display: flex; align-items: center; gap: 8px; }
.start-row input { width: 110px; }
.start-row span { font-size: 14px; color: var(--text-muted); }

.col-headers {
  display: grid; grid-template-columns: 85px 90px 118px;
  gap: 6px; padding: 0 2px 6px;
}
.col-headers span { font-size: 11px; color: var(--text-hint); text-align: center; }
.col-headers span:first-child { text-align: left; padding-left: 2px; }

.player-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.player-inner { display: grid; grid-template-columns: 85px 90px 118px; gap: 6px; flex: 1; min-width: 0; }
.player-inner input { text-align: center; }
.remove-btn {
  background: none; border: none; color: var(--text-hint);
  font-size: 20px; cursor: pointer; padding: 0 2px; flex-shrink: 0; width: 28px;
  display: flex; align-items: center; justify-content: center;
}
.remove-btn:active { color: var(--text); }

.stepper {
  display: flex; align-items: center;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); height: 40px; overflow: hidden;
}
.stepper-btn {
  background: none; border: none; color: var(--text); font-size: 18px;
  width: 36px; height: 100%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;
}
.stepper-btn:active { background: var(--border); }
.stepper-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.stepper-val { flex: 1; text-align: center; font-size: 15px; font-weight: 600; color: var(--text); pointer-events: none; }

.add-btn {
  width: 100%; height: 40px; background: none;
  border: 1px dashed var(--border-strong); border-radius: var(--radius);
  color: var(--text-muted); font-size: 14px; font-family: inherit;
  cursor: pointer; margin-top: 4px; -webkit-tap-highlight-color: transparent;
}
.add-btn:active { background: var(--border); }

.chip-status { border-radius: var(--radius); padding: 9px 12px; font-size: 13px; margin-top: 10px; display: none; line-height: 1.5; }
.chip-ok   { background: var(--green-bg); color: var(--green); display: block; }
.chip-warn { background: var(--amber-bg); color: var(--amber); display: block; }

.calc-btn {
  width: 100%; height: 50px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-lg);
  font-size: 16px; font-weight: 600; font-family: inherit;
  cursor: pointer; margin-top: 4px; letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
}
.calc-btn:active { opacity: 0.8; }

.result-card { display: none; }
.result-card.show { display: block; }
.result-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
.balance-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; font-size: 15px; border-bottom: 1px solid var(--border); }
.balance-row:last-child { border-bottom: none; }
.pos  { color: var(--green); font-weight: 700; }
.neg  { color: var(--red);   font-weight: 700; }
.zero { color: var(--text-muted); }
.txn-row { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; font-size: 15px; }
.txn-row:last-child { margin-bottom: 0; }
.txn-arrow { color: var(--text-hint); font-size: 14px; }
.txn-amount { font-weight: 700; color: var(--text); margin-left: auto; }
.no-txn { font-size: 14px; color: var(--text-muted); padding: 8px 0; }

.save-btn {
  width: 100%; height: 46px; background: var(--green-bg); color: var(--green);
  border: 1px solid #a8d8bf; border-radius: var(--radius-lg);
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; margin-top: 12px; -webkit-tap-highlight-color: transparent;
}
.save-btn:active { opacity: 0.7; }

/* Stats */
.player-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  -webkit-tap-highlight-color: transparent;
}
.player-card:active { background: var(--bg); }
.player-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0; color: var(--text-muted);
}
.player-card-info { flex: 1; min-width: 0; }
.player-card-name { font-size: 15px; font-weight: 600; }
.player-card-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.player-card-total { font-size: 16px; font-weight: 700; }
.chevron { color: var(--text-hint); font-size: 16px; }

.overall-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.overall-bar-name { font-size: 12px; width: 56px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.overall-bar-wrap { flex: 1; height: 18px; display: flex; align-items: center; }
.bar-fill { height: 100%; border-radius: 4px; min-width: 3px; }
.bar-pos { background: var(--green); }
.bar-neg { background: var(--red); }
.overall-bar-val { font-size: 11px; font-weight: 600; flex-shrink: 0; width: 64px; text-align: right; }

.stat-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-box2 { background: var(--bg); border-radius: var(--radius); padding: 10px; text-align: center; }
.stat-box2-label { font-size: 10px; color: var(--text-hint); margin-bottom: 3px; }
.stat-box2-val   { font-size: 17px; font-weight: 700; }

/* Detail */
.detail-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.detail-stat-box  { background: var(--bg); border-radius: var(--radius); padding: 12px; text-align: center; }
.detail-stat-label { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
.detail-stat-val   { font-size: 18px; font-weight: 700; }

.chart-wrap { width: 100%; }
canvas { width: 100% !important; height: 200px !important; display: block; }

.game-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 9px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.game-row:last-child { border-bottom: none; }
.game-row-date { font-size: 12px; color: var(--text-muted); }
.game-row-yen  { font-weight: 700; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-hint); font-size: 14px; line-height: 2; }

.game-row-del { background: none; border: none; color: var(--text-hint); font-size: 16px; cursor: pointer; padding: 0 2px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.game-row-del:active { color: var(--red); }
.reset-btn { width: 100%; height: 42px; background: none; color: var(--red); border: 1px solid #e8b4b0; border-radius: var(--radius-lg); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 4px; -webkit-tap-highlight-color: transparent; }
.reset-btn:active { background: var(--red-bg); }
</style>
</head>
<body>

<header>
  <button class="header-back" id="header-back" onclick="goBack()">‹</button>
  <div class="header-text">
    <h1 id="header-title">♠ ポーカー清算</h1>
    <p id="header-sub">レートとプレイヤー情報を入力して清算</p>
  </div>
</header>

<!-- 清算 -->
<div class="page active" id="page-calc">
  <div class="card">
    <p class="card-title">レート設定</p>
    <div class="rate-grid">
      <span>チップ</span>
      <input type="number" id="chip-unit" value="20000" min="1" step="100" inputmode="numeric" oninput="updateAll()">
      <span>点 ＝</span>
      <input type="number" id="yen-unit" value="10000" min="1" step="100" inputmode="numeric" oninput="updateAll()">
      <span>円</span>
    </div>
    <div class="rate-preview" id="rate-preview"></div>
  </div>
  <div class="card">
    <p class="card-title">スタートチップ（全員共通）</p>
    <div class="start-row">
      <input type="number" id="start-chip" value="20000" min="0" step="100" inputmode="numeric" oninput="updateAll()">
      <span>点</span>
    </div>
  </div>
  <div class="card">
    <p class="card-title">プレイヤー</p>
    <div class="col-headers"><span>名前</span><span>点数</span><span>おかわり</span></div>
    <div id="players"></div>
    <button class="add-btn" onclick="addPlayer()">＋ プレイヤーを追加</button>
    <div class="chip-status" id="chip-status"></div>
  </div>
  <button class="calc-btn" onclick="calculate()">清　算　す　る</button>
  <div class="card result-card" id="result-summary" style="margin-top:12px;">
    <p class="result-title">損益サマリー</p>
    <div id="balance-list"></div>
  </div>
  <div class="card result-card" id="result-txn">
    <p class="result-title">送金リスト（最小回数）</p>
    <div id="txn-list"></div>
    <button class="save-btn" onclick="saveResult()">💾　この結果を保存する</button>
  </div>
</div>

<!-- 収支 -->
<div class="page" id="page-stats"><div id="stats-content"></div></div>

<!-- 詳細 -->
<div class="page" id="page-detail"><div id="detail-content"></div></div>

<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" id="nav-calc"  onclick="showPage('calc')"> <span class="nav-icon">🃏</span>清算</button>
  <button class="nav-btn"        id="nav-stats" onclick="showPage('stats')"><span class="nav-icon">📊</span>収支</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}</script>
<script>
let players = [], pid = 0;
let lastBalances = null, lastMeta = null;
let lineChart = null;
let currentDetailName = '';

function loadHistory() { try { return JSON.parse(localStorage.getItem('poker_history')||'[]'); } catch(e){ return []; } }
function saveHistory(h) { localStorage.setItem('poker_history', JSON.stringify(h)); }

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const backBtn = document.getElementById('header-back');
  const nav     = document.getElementById('bottom-nav');
  if (name === 'detail') {
    backBtn.style.display = 'block'; nav.style.display = 'none';
  } else {
    backBtn.style.display = 'none'; nav.style.display = 'flex';
    document.getElementById('nav-'+name)?.classList.add('active');
  }
  const titles = { calc:'♠ ポーカー清算', stats:'収支' };
  const subs   = { calc:'レートとプレイヤー情報を入力して清算', stats:'プレイヤーをタップで詳細を表示' };
  if (titles[name]) {
    document.getElementById('header-title').textContent = titles[name];
    document.getElementById('header-sub').textContent   = subs[name];
  }
  if (name === 'stats') renderStats();
}

function goBack() { showPage('stats'); }

function openDetail(name) {
  currentDetailName = name;
  renderDetail(name);
  showPage('detail');
  document.getElementById('header-title').textContent = name;
  document.getElementById('header-sub').textContent   = '収支履歴';
}

function updateAll() { updatePreview(); checkChips(); }
function updatePreview() {
  const cu=+document.getElementById('chip-unit').value||0, yu=+document.getElementById('yen-unit').value||0;
  const el=document.getElementById('rate-preview');
  if(!cu||!yu){el.textContent='';return;}
  el.innerHTML=`1,000点 ＝ <b>${fmt(yu/cu*1000)}円</b>　／　1万点 ＝ <b>${fmt(yu/cu*10000)}円</b>`;
}
function fmt(n){ return n%1===0?n.toLocaleString():n.toFixed(1); }

function checkChips() {
  const start=+document.getElementById('start-chip').value||0;
  const valid=players.filter(p=>p.chips!=='');
  const el=document.getElementById('chip-status');
  if(!valid.length||!start){el.className='chip-status';return;}
  const totalIn =valid.reduce((s,p)=>s+start*(1+(p.okawari||0)),0);
  const totalOut=valid.reduce((s,p)=>s+(p.chips||0),0);
  const diff=totalOut-totalIn;
  if(diff===0){
    el.className='chip-status chip-ok';
    el.textContent=`チップ合計が一致しています（${totalOut.toLocaleString()}点）`;
  } else {
    el.className='chip-status chip-warn';
    el.textContent=`合計が合いません。差分: ${diff>0?'+':''}${diff.toLocaleString()}点（入力 ${totalOut.toLocaleString()} ／ 想定 ${totalIn.toLocaleString()}）`;
  }
}

function stepOkawari(id,delta){
  const p=players.find(p=>p.id===id); if(!p)return;
  p.okawari=Math.max(0,(p.okawari||0)+delta);
  document.getElementById('ok-val-'+id).textContent=p.okawari;
  checkChips();
}
function addPlayer(name='',chips='',okawari=0){
  const id=pid++; players.push({id,name,chips,okawari});
  const wrap=document.createElement('div');
  wrap.className='player-wrap'; wrap.id='pr-'+id;
  wrap.innerHTML=`
    <div class="player-inner">
      <input type="text" placeholder="名前" value="${name}" oninput="updatePlayer(${id},'name',this.value)"/>
      <input type="number" placeholder="点数" value="${chips}" step="100" inputmode="numeric" oninput="updatePlayer(${id},'chips',this.value)"/>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepOkawari(${id},-1)">－</button>
        <div class="stepper-sep"></div>
        <span class="stepper-val" id="ok-val-${id}">${okawari}</span>
        <div class="stepper-sep"></div>
        <button class="stepper-btn" onclick="stepOkawari(${id},1)">＋</button>
      </div>
    </div>
    <button class="remove-btn" onclick="removePlayer(${id})">×</button>`;
  document.getElementById('players').appendChild(wrap);
}
function updatePlayer(id,key,val){
  const p=players.find(p=>p.id===id); if(!p)return;
  p[key]=key==='chips'?(val===''?'':+val):val; checkChips();
}
function removePlayer(id){
  players=players.filter(p=>p.id!==id);
  document.getElementById('pr-'+id)?.remove(); checkChips();
}

function calculate(){
  const chipUnit=+document.getElementById('chip-unit').value||0;
  const yenUnit =+document.getElementById('yen-unit').value ||0;
  const start   =+document.getElementById('start-chip').value||0;
  if(!chipUnit||!yenUnit){alert('レートを入力してください');return;}
  if(!start){alert('スタートチップを入力してください');return;}
  const valid=players.filter(p=>p.name&&p.chips!=='');
  if(valid.length<2){alert('プレイヤーを2人以上入力してください');return;}
  lastMeta={chipUnit,yenUnit,start,date:new Date().toISOString()};
  lastBalances=valid.map(p=>({name:p.name,yen:Math.round((p.chips-start*(1+(p.okawari||0)))/chipUnit*yenUnit)}));
  document.getElementById('balance-list').innerHTML=lastBalances.slice().sort((a,b)=>b.yen-a.yen)
    .map(b=>`<div class="balance-row"><span>${b.name}</span><span class="${b.yen>0?'pos':b.yen<0?'neg':'zero'}">${b.yen>0?'+':''}${b.yen.toLocaleString()}円</span></div>`).join('');
  let debtors  =lastBalances.filter(b=>b.yen<0).map(b=>({name:b.name,amt:-b.yen})).sort((a,b)=>b.amt-a.amt);
  let creditors=lastBalances.filter(b=>b.yen>0).map(b=>({name:b.name,amt: b.yen})).sort((a,b)=>b.amt-a.amt);
  const txns=[]; let di=0,ci=0;
  while(di<debtors.length&&ci<creditors.length){
    const d=debtors[di],c=creditors[ci],amt=Math.min(d.amt,c.amt);
    if(amt>=1)txns.push({from:d.name,to:c.name,amt});
    d.amt-=amt;c.amt-=amt;if(d.amt<1)di++;if(c.amt<1)ci++;
  }
  document.getElementById('txn-list').innerHTML=txns.length===0
    ?'<p class="no-txn">全員トントンです！</p>'
    :txns.map(t=>`<div class="txn-row"><span style="font-weight:600">${t.from}</span><span class="txn-arrow">→</span><span style="font-weight:600">${t.to}</span><span class="txn-amount">${t.amt.toLocaleString()}円</span></div>`).join('');
  document.getElementById('result-summary').className='card result-card show';
  document.getElementById('result-txn').className='card result-card show';
  document.getElementById('result-summary').scrollIntoView({behavior:'smooth',block:'start'});
}

function saveResult(){
  if(!lastBalances)return;
  const h=loadHistory();
  h.unshift({date:lastMeta.date,chipUnit:lastMeta.chipUnit,yenUnit:lastMeta.yenUnit,start:lastMeta.start,results:lastBalances});
  saveHistory(h); alert('保存しました！');
}

function getPlayerMap(){
  const h=loadHistory(), map={};
  h.forEach((game,gi)=>{
    const d=new Date(game.date);
    const ds=`${d.getMonth()+1}/${d.getDate()}`;
    game.results.forEach(r=>{
      if(!map[r.name])map[r.name]={total:0,wins:0,games:0,history:[]};
      const m=map[r.name];
      m.total+=r.yen; m.games++;
      if(r.yen>0)m.wins++;
      m.history.push({date:ds,yen:r.yen,gameIdx:gi});
    });
  });
  return map;
}

function deleteGame(idx){
  if(!confirm(`第${idx+1}戦のデータを削除しますか？`))return;
  const h=loadHistory(); h.splice(idx,1); saveHistory(h);
  renderStats();
}

function deleteOneGame(gameIdx, playerName){
  if(!confirm('このゲームの記録を削除しますか？\n（そのゲームに参加した全員の記録が消えます）'))return;
  const h=loadHistory(); h.splice(gameIdx,1); saveHistory(h);
  // re-render detail with updated data
  const map=getPlayerMap();
  if(map[playerName]){ renderDetail(playerName); }
  else { showPage('stats'); }
}

function resetAll(){
  if(!confirm('全データを削除しますか？\nこの操作は取り消せません。'))return;
  localStorage.removeItem('poker_history');
  renderStats();
}

function renderStats(){
  const h=loadHistory(), el=document.getElementById('stats-content');
  if(!h.length){el.innerHTML='<div class="empty-state">まだ保存されたデータがありません。<br>清算後に「保存」ボタンを押してください。</div>';return;}
  const map=getPlayerMap();
  const plist=Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  const maxAbs=Math.max(...plist.map(([,v])=>Math.abs(v.total)),1);

  let html=`<div class="card" style="margin-top:0">
    <p class="card-title">全体サマリー</p>
    <div class="stat-grid2">
      <div class="stat-box2"><div class="stat-box2-label">ゲーム数</div><div class="stat-box2-val">${h.length}</div></div>
      <div class="stat-box2"><div class="stat-box2-label">参加人数</div><div class="stat-box2-val">${plist.length}</div></div>
    </div>`;
  plist.forEach(([name,v])=>{
    const pct=Math.round(Math.abs(v.total)/maxAbs*100), isPos=v.total>=0;
    html+=`<div class="overall-bar-row">
      <span class="overall-bar-name">${name}</span>
      <div class="overall-bar-wrap"><div class="bar-fill ${isPos?'bar-pos':'bar-neg'}" style="width:${pct}%"></div></div>
      <span class="overall-bar-val ${isPos?'pos':'neg'}">${isPos?'+':''}${v.total.toLocaleString()}円</span>
    </div>`;
  });
  html+=`</div><p class="card-title" style="padding:0 4px;margin-bottom:8px">プレイヤー別　（タップで詳細）</p>`;
  plist.forEach(([name,v])=>{
    const wr=Math.round(v.wins/v.games*100), avg=Math.round(v.total/v.games);
    html+=`<div class="player-card" onclick="openDetail('${name.replace(/'/g,"\\'")}')">
      <div class="player-avatar">${name.charAt(0)}</div>
      <div class="player-card-info">
        <div class="player-card-name">${name}</div>
        <div class="player-card-sub">${v.games}戦 / 勝率${wr}% / 平均${avg>=0?'+':''}${avg.toLocaleString()}円</div>
      </div>
      <div class="player-card-total ${v.total>=0?'pos':'neg'}">${v.total>=0?'+':''}${v.total.toLocaleString()}円</div>
      <span class="chevron">›</span>
    </div>`;
  });
  el.innerHTML=html;
}

function renderDetail(name){
  const map=getPlayerMap(), v=map[name];
  const el=document.getElementById('detail-content');
  if(!v){el.innerHTML='<div class="empty-state">データがありません</div>';return;}
  const wr=Math.round(v.wins/v.games*100), avg=Math.round(v.total/v.games);
  let cum=0;
  const lineLabels=['開始'], lineData=[0];
  v.history.forEach(h=>{ cum+=h.yen; lineLabels.push(h.date); lineData.push(cum); });

  let html=`
    <div class="card" style="margin-top:0">
      <p class="card-title">サマリー</p>
      <div class="detail-stat-grid">
        <div class="detail-stat-box"><div class="detail-stat-label">累計収支</div><div class="detail-stat-val ${v.total>=0?'pos':'neg'}">${v.total>=0?'+':''}${v.total.toLocaleString()}円</div></div>
        <div class="detail-stat-box"><div class="detail-stat-label">参加回数</div><div class="detail-stat-val">${v.games}回</div></div>
        <div class="detail-stat-box"><div class="detail-stat-label">勝率</div><div class="detail-stat-val">${wr}%</div></div>
        <div class="detail-stat-box"><div class="detail-stat-label">平均収支</div><div class="detail-stat-val ${avg>=0?'pos':'neg'}">${avg>=0?'+':''}${avg.toLocaleString()}円</div></div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">累計収支の推移</p>
      <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
    </div>
    <div class="card">
      <p class="card-title">ゲームごとの収支一覧</p>
      <div>`;
  v.history.slice().reverse().forEach((h,i)=>{
    const num=v.history.length-i;
    html+=`<div class="game-row">
      <span class="game-row-date">第${num}戦　${h.date}</span>
      <span class="game-row-yen ${h.yen>0?'pos':h.yen<0?'neg':'zero'}" style="margin-left:auto">${h.yen>0?'+':''}${h.yen.toLocaleString()}円</span>
      <button class="game-row-del" onclick="deleteOneGame(${h.gameIdx},'${currentDetailName.replace(/'/g,"\\'")}')">🗑</button>
    </div>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;

  if(lineChart){lineChart.destroy();lineChart=null;}
  setTimeout(()=>{
    const lc=document.getElementById('line-chart'); if(!lc)return;
    const isUp=lineData[lineData.length-1]>=0;
    lineChart=new Chart(lc,{
      type:'line',
      data:{
        labels:lineLabels,
        datasets:[{
          data:lineData,
          borderColor:isUp?'#1a6644':'#c0392b',
          backgroundColor:isUp?'rgba(26,102,68,0.08)':'rgba(192,57,43,0.08)',
          borderWidth:2, pointRadius:4,
          pointBackgroundColor:isUp?'#1a6644':'#c0392b',
          fill:true, tension:0.3
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10},color:'#b0ada4'}},
          y:{grid:{color:'#e2e0d8'},ticks:{font:{size:10},color:'#b0ada4',
            callback:v=>(v>=0?'+':'')+v.toLocaleString()+'円'}}
        }
      }
    });
  },50);
}

addPlayer('','',0); addPlayer('','',0); addPlayer('','',0);
updateAll();
</script>
